<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'none'; script-src 'none'; frame-src 'none'">
  <title>DuNorth — Chat</title>
  <link rel="preload" href="/anara/fonts/inter_display_regular-s.p.89adc6fc.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    :root { --bg:#ffffff; --fg:#0a0a0a; --muted:#6b7280; --border:#e5e7eb; }
    html,body{height:100%}
    body{margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--fg);}
    .wrapper{min-height:100%; display:flex; flex-direction:column}
    .container{max-width:960px; margin:0 auto; padding:24px}
    header{display:flex; align-items:center; justify-content:space-between; padding:16px 0}
    .brand{font-weight:600; letter-spacing:.2px}
    .chat{flex:1; display:flex; flex-direction:column; gap:16px}
    .banner{padding:16px; border:1px solid var(--border); border-radius:14px; background:#fafafa}
    .banner h1{margin:0 0 4px 0; font-size:16px}
    .banner p{margin:0; color:var(--muted); font-size:14px}
    .messages{display:flex; flex-direction:column; gap:12px; padding:8px 0}
    .input{position:sticky; bottom:0; padding:12px 0; background:var(--bg)}
    .input form{display:flex; gap:8px}
    .input input{flex:1; border:1px solid var(--border); border-radius:9999px; padding:12px 16px; font-size:14px}
    .input button{border:1px solid #000; background:#000; color:#fff; border-radius:9999px; padding:12px 18px; font-size:14px}
    /* Hide any leftover UI if CDN caches old assets */
    [data-onboarding],[aria-label*="Get started"],[class*="Get started"]{display:none !important}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <header>
        <div class="brand">DuNorth</div>
      </header>

      <main class="chat">
        <section class="banner">
          <h1>AI workspace that knows your assignments, readings, and deadlines.</h1>
          <p>Drop in what you’re working on and start chatting.</p>
        </section>

        <section class="messages" aria-live="polite" aria-atomic="false">
          <!-- Empty by design for static version -->
        </section>

        <section class="input">
          <form action="#" method="get">
            <input type="text" placeholder="What schoolwork do you have to do today?" aria-label="Message input">
            <button type="submit" aria-label="Send">Send</button>
          </form>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
