<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuNorth Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .new-chat-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        
        .intro {
            text-align: center;
            margin-top: 100px;
            color: #555;
        }
        
        .intro h2 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .intro p {
            font-size: 16px;
            opacity: 0.8;
        }
        
        .messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            word-wrap: break-word;
        }
        
        .message.user {
            align-self: flex-end;
            background: #dcf8c6;
        }
        
        .message.assistant {
            align-self: flex-start;
            background: #fff;
        }
        
        .footer {
            background: #fff;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-container {
            display: flex;
            max-width: 900px;
            margin: 0 auto;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            resize: none;
            min-height: 40px;
            max-height: 100px;
            font-family: inherit;
            font-size: 14px;
        }
        
        .send-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .send-btn:hover {
            background: #0056b3;
        }
        
        .intro.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>DuNorth Chat</h1>
        <button class="new-chat-btn" onclick="newChat()">New Chat</button>
    </header>

    <main class="main">
        <div class="intro" id="intro">
            <h2>AI workspace that knows your assignments, readings, and deadlines.</h2>
            <p>Start by asking a question or uploading a document.</p>
        </div>
        
        <div class="messages" id="messages"></div>
    </main>

    <footer class="footer">
        <div class="input-container">
            <textarea 
                class="chat-input" 
                id="chatInput" 
                placeholder="What schoolwork do you have to do today"
                rows="1"
                onkeypress="handleKeyPress(event)"
                oninput="handleInput()"
            ></textarea>
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </footer>

    <script>
        let messages = [];
        
        function handleInput() {
            const input = document.getElementById('chatInput');
            const intro = document.getElementById('intro');
            
            if (input.value.trim() && !intro.classList.contains('hidden')) {
                intro.classList.add('hidden');
            } else if (!input.value.trim() && messages.length === 0) {
                intro.classList.remove('hidden');
            }
            
            // Auto-resize textarea
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            input.style.height = '40px';
            
            // Hide intro
            document.getElementById('intro').classList.add('hidden');
            
            // Simulate DuNorth response
            setTimeout(() => {
                const responses = [
                    "I'd be happy to help you with your schoolwork! Can you tell me more about what specific assignments or subjects you're working on?",
                    "Let me help you organize your assignments. What's your most pressing deadline?",
                    "I can help you break down your work into manageable tasks. What subject are you focusing on?",
                    "Great question! Let me help you tackle your schoolwork step by step."
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                addMessage(`DuNorth: ${response}`, 'assistant');
            }, 1000);
        }
        
        function addMessage(text, sender) {
            messages.push({ text, sender });
            
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function newChat() {
            messages = [];
            document.getElementById('messages').innerHTML = '';
            document.getElementById('intro').classList.remove('hidden');
            document.getElementById('chatInput').focus();
        }
        
        // Focus input on load
        window.addEventListener('load', () => {
            document.getElementById('chatInput').focus();
        });
    </script>
</body>
</html>
